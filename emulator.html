<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emulator</title>
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
    #game { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <!--
    Self-hosted EmulatorJS host, loaded in an iframe by the main page. We host it
    (same origin) so the parent can drive Save/Load via postMessage and tear it
    down cleanly by removing the iframe. The ROM is fetched from a CORS-open URL
    (e.g. GitHub raw homebrew, or archive.org/cors/<id>/<file>); the emulator
    cores come from EmulatorJS's CDN.
    Params:  ?core=<nes|snes|segaMD|gba|gb|segaGG|…>&rom=<rom url>
  -->
  <div id="game"></div>
  <script>
    const params = new URLSearchParams(location.search);
    const reply = (msg) => parent.postMessage(msg, "*");

    window.EJS_player = "#game";
    window.EJS_core = params.get("core") || "";
    window.EJS_gameUrl = params.get("rom") || "";
    window.EJS_pathtodata = "https://cdn.emulatorjs.org/stable/data/";
    window.EJS_startOnLoaded = true;
    // Hide every built-in button that can write a file to the Downloads folder
    // (screenshot, screen record, state-to-file, .sav export/import, cache mgr).
    // Progress is saved only through the parent page's ⤓ Save / ⤒ Load buttons,
    // which keep it in localStorage (browser data) — exactly like the Flash games.
    window.EJS_Buttons = {
      saveState: false, loadState: false,
      quickSave: false, quickLoad: false,
      screenshot: false, screenRecord: false,
      saveSavFiles: false, loadSavFiles: false,
      cacheManager: false,
    };
    // Tell the parent the emulator is up so it can hide its "Loading…" overlay.
    window.EJS_ready = () => reply({ emu: "ready" });
    window.EJS_onGameStart = () => reply({ emu: "ready" });

    // Save/Load are driven by the parent's player buttons.
    window.addEventListener("message", async (e) => {
      const m = e.data || {};
      const gm = window.EJS_emulator && window.EJS_emulator.gameManager;
      if (!gm) return;
      try {
        if (m.emu === "getState") {
          // getState() returns a Uint8Array (older builds returned a Promise).
          const state = await Promise.resolve(gm.getState());
          reply({ emu: "state", data: state });
        } else if (m.emu === "loadState" && m.data) {
          const bytes = m.data instanceof Uint8Array ? m.data : new Uint8Array(m.data);
          await Promise.resolve(gm.loadState(bytes));
          reply({ emu: "loaded" });
        }
      } catch (err) {
        reply({ emu: "error", msg: String(err && err.message || err) });
      }
    });

    // While the game has focus, key events fire in THIS iframe, so the parent's
    // listeners never see them. Forward our shortcuts out to the parent:
    //   Ctrl+Y quick save · Ctrl+U quick load · Ctrl+L panic (back to math).
    document.addEventListener("keydown", (e) => {
      if (!(e.ctrlKey || e.metaKey)) return;
      const k = (e.key || "").toLowerCase();
      if (k === "y") { e.preventDefault(); reply({ emu: "hotkey", action: "save" }); }
      else if (k === "u") { e.preventDefault(); reply({ emu: "hotkey", action: "load" }); }
      else if (k === "l") { e.preventDefault(); reply({ emu: "hotkey", action: "math" }); }
    });
  </script>
  <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>
</body>
</html>
